<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Kirviko Aquarium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #0a7c6e;
      --teal-light: #0fa58f;
      --teal-pale: #e8f5f3;
      --dark: #1a2526;
      --mid: #4a5c5e;
      --border: #dde8e6;
      --font-head: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, #0d2e2a 0%, #0a7c6e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .auth-card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .auth-logo a {
      font-family: var(--font-head);
      font-size: 1.6rem;
      color: var(--teal);
      text-decoration: none;
    }
    .auth-logo p {
      color: var(--mid);
      font-size: 0.88rem;
      margin-top: 0.3rem;
    }
    h1 {
      font-family: var(--font-head);
      font-size: 1.5rem;
      color: var(--dark);
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: var(--font-body);
      color: var(--dark);
      transition: border-color 0.2s;
      outline: none;
    }
    .form-group input:focus { border-color: var(--teal); }
    .btn-submit {
      width: 100%;
      background: var(--teal);
      color: white;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { background: var(--teal-light); }
    .auth-switch {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.88rem;
      color: var(--mid);
    }
    .auth-switch a { color: var(--teal); font-weight: 600; text-decoration: none; }
    .auth-switch a:hover { text-decoration: underline; }
    .messages { margin-bottom: 1rem; }
    .alert {
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 0.88rem;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <a href="/">🐟 Kirviko Aquarium</a>
      <p>Vijayawada's Premium Fish Store</p>
    </div>
    <h1>Welcome Back</h1>

    {% if messages %}
    <div class="messages">
      {% for message in messages %}
      <div class="alert">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit">Login</button>
    </form>

    <div class="auth-switch">
      Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
    </div>
  </div>
</body>
</html>
